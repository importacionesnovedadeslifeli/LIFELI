<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFELI - Siempre Joven</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    :root { --primary: #000; --bg: #f8f9fa; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); padding-top: 90px; margin: 0; }
    
    /* Navbar Responsivo */
    .navbar-pro { background: white; height: 85px; position: fixed; top: 0; width: 100%; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #eee; }
    .brand-name { font-weight: 700; font-size: 1.4rem; margin: 0; line-height: 1; }
    .brand-slogan { font-size: 0.7rem; color: #888; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

    /* Buscador */
    .search-bar { display: none; position: absolute; top: 85px; left: 0; width: 100%; background: white; padding: 15px; z-index: 1900; border-bottom: 2px solid #000; }
    .search-bar.active { display: block; }

    /* Categorías Scrollable */
    .tabs-sticky { background: white; overflow-x: auto; white-space: nowrap; padding: 12px; position: sticky; top: 85px; z-index: 1800; border-bottom: 1px solid #eee; }
    .tabs-sticky::-webkit-scrollbar { display: none; }
    .tab-btn { display: inline-block; padding: 8px 20px; margin-right: 10px; border-radius: 50px; background: #f0f0f0; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .tab-btn.active { background: #000; color: white; }

    /* Grid que no se descuadra: 2 columnas en movil, 4 en PC */
    .product-card { border: none; border-radius: 20px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); height: 100%; padding: 12px; display: flex; flex-direction: column; }
    .img-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; }
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* Carrito lateral */
    .drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 3000; transition: 0.4s; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .drawer.open { right: 0; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; display: none; }
    .overlay.active { display: block; }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<nav class="navbar-pro shadow-sm">
  <div class="d-flex align-items-center">
    <button class="btn fs-3 border-0 p-0 me-3" onclick="toggleSearch()"><i class="bi bi-search"></i></button>
    <div id="logo-container" class="d-flex align-items-center">
        <div id="logo-img"></div>
        <div>
            <h1 class="brand-name">LIFELI</h1>
            <p class="brand-slogan">Siempre Joven</p>
        </div>
    </div>
  </div>
  <button class="btn btn-dark rounded-pill px-3 fw-bold" onclick="toggleCart()">
    <i class="bi bi-cart3"></i> <span id="badge" class="badge bg-danger ms-1">0</span>
  </button>
</nav>

<div class="search-bar shadow-sm" id="search-box">
  <input type="text" id="input-search" class="form-control rounded-pill" placeholder="Buscar producto..." onkeyup="buscar()">
</div>

<div class="tabs-sticky shadow-sm" id="tabs">
  <button class="tab-btn active" onclick="filtrar('Todos', this)">Todos</button>
</div>

<div class="container mt-4 pb-5">
  <div id="banner-box" class="mb-4"></div>
  <div id="grid" class="row row-cols-2 row-cols-md-4 g-3">
    <div class="text-center w-100 py-5"><div class="spinner-border text-dark"></div><p>Cargando LIFELI...</p></div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
    <h5 class="m-0 fw-bold">🛒 Mi Pedido</h5>
    <button class="btn-close" onclick="toggleCart()"></button>
  </div>
  <div id="cart-list" class="p-4 flex-grow-1 overflow-auto"></div>
  <div class="p-4 border-top bg-light">
    <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
      <span>Total:</span><span>S/ <span id="total">0.00</span></span>
    </div>
    <button class="btn btn-success w-100 py-3 fw-bold rounded-4 shadow" onclick="enviarPedido()">PEDIR POR WHATSAPP</button>
  </div>
</div>

<script>
  // PEGA AQUÍ TU URL DE GOOGLE SCRIPT (LA QUE TERMINA EN /exec)
  const URL_API = "https://script.google.com/macros/s/AKfycbyTWkgxsIjxCqN-D5o1UwgQ_G09VkLi_Xt3JG8a3_gG7YDFT_nTuP6_0jsS0-6aZSt_/exec"; 

  let DB = []; let CART = {}; let TEL = "";

  async function cargarDatos() {
    try {
      const resp = await fetch(URL_API);
      const res = await resp.json();
      DB = res.productos; TEL = res.config.whatsapp;
      
      if(res.config.logo) document.getElementById('logo-img').innerHTML = `<img src="${fixUrl(res.config.logo)}" height="45" class="me-2">`;
      if(res.config.banner) document.getElementById('banner-box').innerHTML = `<img src="${fixUrl(res.config.banner)}" class="w-100 rounded-4 shadow-sm">`;
      
      const cats = [...new Set(DB.map(p => p.categoria))].filter(c => c && c !== "General");
      cats.forEach(c => document.getElementById('tabs').innerHTML += `<button class="tab-btn" onclick="filtrar('${c}', this)">${c}</button>`);
      render(DB);
    } catch(e) {
      document.getElementById('grid').innerHTML = "Error al cargar productos.";
    }
  }

  function fixUrl(url) {
    if(!url) return 'https://via.placeholder.com/300?text=LIFELI';
    let u = url.trim();
    if(u.includes('postimg.cc') && !u.includes('i.postimg.cc')) return u.replace('postimg.cc', 'i.postimg.cc') + '.jpg';
    if(u.includes('drive.google.com')) return u.replace('/view?usp=sharing', '').replace('file/d/', 'uc?export=view&id=');
    return u;
  }

  function render(lista) {
    const grid = document.getElementById('grid');
    grid.innerHTML = lista.map(p => `
      <div class="col">
        <div class="product-card text-center">
          <div class="img-box"><img src="${fixUrl(p.imagen)}" onerror="this.src='https://via.placeholder.com/300?text=LIFELI'"></div>
          <h6 class="fw-bold text-truncate small mb-1">${p.nombre}</h6>
          <p class="text-dark fw-bold small mb-2">S/ ${p.precio.toFixed(2)}</p>
          <button class="btn btn-dark btn-sm rounded-pill w-100 py-1 mt-auto" onclick="add('${p.nombre}', ${p.precio})">+ Añadir</button>
        </div>
      </div>`).join('');
  }

  function toggleSearch() { 
    const s = document.getElementById('search-box');
    s.classList.toggle('active');
    if(s.classList.contains('active')) document.getElementById('input-search').focus();
  }

  function buscar() {
    const t = document.getElementById('input-search').value.toLowerCase().trim();
    render(DB.filter(p => p.nombre.toLowerCase().includes(t)));
  }

  function filtrar(c, e) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.classList.add('active');
    render(c === 'Todos' ? DB : DB.filter(p => p.categoria === c));
  }

  function toggleCart() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
  function add(n, p) { if(CART[n]) CART[n].q++; else CART[n] = { p, q: 1 }; updateUI(); }
  function updateQty(n, d) { CART[n].q += d; if(CART[n].q <= 0) delete CART[n]; updateUI(); }
  function del(n) { delete CART[n]; updateUI(); }

  function updateUI() {
    const list = document.getElementById('cart-list');
    let total = 0; let count = 0; let html = "";
    for (let n in CART) {
      total += CART[n].p * CART[n].q; count += CART[n].q;
      html += `<div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
        <div style="width:60%"><div class="fw-bold small">${n}</div></div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-light border" onclick="updateQty('${n}', -1)">-</button>
          <span class="fw-bold">${CART[n].q}</span>
          <button class="btn btn-sm btn-light border" onclick="updateQty('${n}', 1)">+</button>
          <button class="btn btn-sm text-danger" onclick="del('${n}')"><i class="bi bi-trash3"></i></button>
        </div>
      </div>`;
    }
    list.innerHTML = html || 'Carrito vacío';
    document.getElementById('badge').innerText = count;
    document.getElementById('total').innerText = total.toFixed(2);
  }

  function enviarPedido() {
    let m = "¡Hola LIFELI! Mi pedido es:%0A%0A";
    for(let n in CART) m += `✅ *${CART[n].q}x* ${n}%0A`;
    window.open(`https://wa.me/${TEL}?text=${m}%0A💰 *TOTAL: S/ ${document.getElementById('total').innerText}*`, '_blank');
  }

  cargarDatos();
</script>
</body>
</html>
